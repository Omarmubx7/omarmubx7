name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: profile/stats.svg
          options: username=Omarmubx7&show_icons=true&theme=dark&hide_border=false&include_all_commits=true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          path: profile/top-langs.svg
          options: username=Omarmubx7&theme=dark&hide_border=false&layout=compact&langs_count=8
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub stats" || exit 0
          git push